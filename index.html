<style>
:root {
  --navy: #002B45;
  --blue: #0073CF;
  --cyan: #00A9E0;
  --digital: #00549F;
  --amber: #F0AB00;
  --red: #D52B1E;
  --light: #f4f8fb;
  --white: #ffffff;
  --text: #1a2535;
  --muted: #6b7f96;
  --border: #dce6ef;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 658px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: var(--light);
  color: var(--text);
}

.wrapper {
  width: 100%;
  height: 658px;
  display: flex;
  flex-direction: column;
  padding: 20px 24px;
  gap: 14px;
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-icon { width: 38px; height: 38px; background: #e0f4fb; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
.header-title { font-size: 1.8rem; font-weight: 600; color: var(--navy); letter-spacing: -0.02em; }
.header-sub { font-size: 1.05rem; color: var(--muted); margin-top: 1px; }

.month-tabs { display: flex; gap: 6px; flex-shrink: 0; }
.month-tab { padding: 9px 26px; border-radius: 8px; border: 1.5px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 1.1rem; font-weight: 500; color: var(--muted); background: var(--white); cursor: pointer; transition: all 0.2s; }
.month-tab:hover { border-color: var(--blue); color: var(--blue); }
.month-tab.active { background: var(--navy); color: var(--white); border-color: var(--navy); font-weight: 600; }

.table-wrap { background: var(--white); border-radius: 14px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); overflow: hidden; flex: 1; display: flex; flex-direction: column; min-height: 0; }
.table-scroll { overflow-y: auto; flex: 1; min-height: 0; }
.table-scroll::-webkit-scrollbar { width: 6px; }
.table-scroll::-webkit-scrollbar-track { background: transparent; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.cal-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.col-date { width: 12%; }
.col-actions { width: 20%; }
.col-order { width: 16%; }
.col-notes { width: auto; }

.cal-table thead tr { position: sticky; top: 0; z-index: 2; }
.cal-table th { background: var(--navy); color: var(--white); padding: 13px 24px; text-align: left; font-size: 0.92rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
.cal-table td { padding: 13px 24px; border-bottom: 1px solid #f0f4f8; font-size: 1.1rem; vertical-align: middle; text-align: left; }
.cal-table tbody tr:last-child td { border-bottom: none; }
.cal-table tbody tr:hover td { background: #f7fafd; }

.day-num { font-weight: 700; color: var(--navy); white-space: nowrap; font-size: 1.05rem; }
.order-col { display: flex; flex-direction: column; gap: 4px; align-items: flex-start; }

.cal-badge { display: inline-flex; align-items: center; gap: 4px; padding: 5px 13px; border-radius: 20px; font-size: 0.88rem; font-weight: 600; margin: 2px 2px 2px 0; white-space: nowrap; color: #ffffff; }
.badge-post    { background: #00A9E0; }
.badge-digital { background: #00549F; }
.badge-print   { background: #F0AB00; color: #3a2800; }
.badge-video   { background: #D52B1E; }

.notes-text { color: var(--navy); font-size: 1.2rem; line-height: 1.45; }

.order-btn { display: inline-flex; align-items: center; gap: 3px; padding: 5px 14px; border-radius: 20px; font-size: 0.88rem; font-weight: 600; white-space: nowrap; background: var(--navy); color: #ffffff; text-decoration: none; transition: background 0.15s; cursor: pointer; }
.order-btn:hover { background: var(--blue); }
</style>

const badgeMap = {
  post:    ['badge-post',    '📱 Social Media'],
  digital: ['badge-digital', '🔗 Digital'],
  print:   ['badge-print',   '🖨 Print'],
  video:   ['badge-video',   '🎬 Video'],
};

function orderBtn(subject, label) {
  return `<a class="order-btn" href="mailto:${EMAIL}?subject=${encodeURIComponent(subject)}">${label}</a>`;
}

function renderCalendar(month) {
  const rows = calendarData[month];
  document.getElementById('calBody').innerHTML = rows.map(row => {
    const badges = row.actions.map(a => `<span class="cal-badge ${badgeMap[a][0]}">${badgeMap[a][1]}</span>`).join('');
    const printBtn = row.actions.includes('print') && row.printSubject ? orderBtn(row.printSubject, 'Order Print') : '';
    const postBtn  = row.postOrder  && row.postSubject  ? orderBtn(row.postSubject,  'Order Social') : '';
    const videoBtn = row.videoOrder && row.videoSubject ? orderBtn(row.videoSubject, 'Order Video')  : '';
    const orderCell = (printBtn || postBtn || videoBtn) ? `<div class="order-col">${printBtn}${postBtn}${videoBtn}</div>` : '';
    return `<tr><td class="day-num">${row.date}</td><td>${badges}</td><td>${orderCell}</td><td class="notes-text">${row.notes}</td></tr>`;
  }).join('');
}

function switchMonth(month, el) {
  document.querySelectorAll('.month-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  renderCalendar(month);
}
